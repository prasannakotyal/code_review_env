spec_version: 1
name: my_env
version: "0.1.0"
description: OpenEnv code review environment for detecting style, bug, and security issues in Python, JavaScript, and TypeScript snippets
author: prasannakotyal
license: MIT
repository: https://github.com/prasannakotyal/code_review_env
python_version: "3.11"

tasks:
  - id: style_check
    name: style_check
    description: Identify code style violations (naming, formatting, conventions)
    difficulty: easy
    max_steps: 5
    grader: server.my_env_environment:StyleCheckGrader
  - id: bug_hunt
    name: bug_hunt
    description: Find functional bugs and logic errors in code
    difficulty: medium
    max_steps: 7
    grader: server.my_env_environment:BugHuntGrader
  - id: full_review
    name: full_review
    description: Identify issues and provide correct fixes for security/correctness problems
    difficulty: hard
    max_steps: 10
    grader: server.my_env_environment:FullReviewGrader

observation:
  code_snippet: string
  issues_found: array
  issues_remaining: integer
  step_count: integer
  message: string
  task_name: string
  language: string

action:
  issue_type: enum[style, bug, security]
  description: string
  line_number: integer
  fix_suggestion: string (optional, for hard mode)

reward:
  range:
    min: 0.01
    max: 0.99
  style_check:
    correct_issue: 0.33
    false_positive: 0.01
  bug_hunt:
    correct_issue: 0.5
    false_positive: 0.01
  full_review:
    correct_issue: 0.5
    correct_fix: 0.49
    false_positive: 0.01

tags:
  - code-review
  - python
  - javascript
  - typescript
  - static-analysis
  - security
