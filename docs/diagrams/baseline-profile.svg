<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Baseline Score Profile</title>
  <desc id="desc">Bar chart of baseline rewards for style_check, bug_hunt, and full_review tasks.</desc>

  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .axis { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .value { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#f8fafc" />
  <text x="56" y="62" class="title">Baseline Reward Profile</text>

  <line x1="110" y1="430" x2="1120" y2="430" stroke="#64748b" stroke-width="2" />
  <line x1="110" y1="100" x2="110" y2="430" stroke="#64748b" stroke-width="2" />

  <line x1="105" y1="430" x2="1120" y2="430" stroke="#e2e8f0" stroke-width="1" />
  <line x1="105" y1="364" x2="1120" y2="364" stroke="#e2e8f0" stroke-width="1" />
  <line x1="105" y1="298" x2="1120" y2="298" stroke="#e2e8f0" stroke-width="1" />
  <line x1="105" y1="232" x2="1120" y2="232" stroke="#e2e8f0" stroke-width="1" />
  <line x1="105" y1="166" x2="1120" y2="166" stroke="#e2e8f0" stroke-width="1" />
  <line x1="105" y1="100" x2="1120" y2="100" stroke="#e2e8f0" stroke-width="1" />

  <text x="70" y="434" class="axis">0.0</text>
  <text x="70" y="368" class="axis">0.2</text>
  <text x="70" y="302" class="axis">0.4</text>
  <text x="70" y="236" class="axis">0.6</text>
  <text x="70" y="170" class="axis">0.8</text>
  <text x="70" y="104" class="axis">1.0</text>

  <rect x="240" y="130" width="200" height="300" rx="8" ry="8" fill="#3b82f6" opacity="0.9" />
  <rect x="520" y="206" width="200" height="224" rx="8" ry="8" fill="#10b981" opacity="0.9" />
  <rect x="800" y="262" width="200" height="168" rx="8" ry="8" fill="#f59e0b" opacity="0.9" />

  <text x="286" y="456" class="label">style_check</text>
  <text x="575" y="456" class="label">bug_hunt</text>
  <text x="840" y="456" class="label">full_review</text>

  <text x="324" y="122" class="value">0.91</text>
  <text x="604" y="198" class="value">0.68</text>
  <text x="884" y="254" class="value">0.51</text>

  <rect x="56" y="476" width="14" height="14" fill="#3b82f6" />
  <text x="78" y="488" class="axis">Easy target: 0.90 - 0.95</text>
  <rect x="300" y="476" width="14" height="14" fill="#10b981" />
  <text x="322" y="488" class="axis">Medium target: 0.60 - 0.75</text>
  <rect x="590" y="476" width="14" height="14" fill="#f59e0b" />
  <text x="612" y="488" class="axis">Hard target: 0.45 - 0.60</text>
</svg>
