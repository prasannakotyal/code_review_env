<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Baseline Score Profile</title>
  <desc id="desc">Bullet chart showing each task score against its target range.</desc>

  <defs>
    <style>
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .axis { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .meta { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .value { font: 700 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="560" fill="#f8fafc" />
  <text x="56" y="62" class="title">Baseline Reward Profile</text>
  <text x="56" y="88" class="subtitle">Observed score markers compared to target ranges per task.</text>

  <rect x="58" y="116" width="1164" height="392" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1" />

  <g id="axis">
    <line x1="260" y1="430" x2="1130" y2="430" stroke="#64748b" stroke-width="2" />
    <line x1="260" y1="160" x2="260" y2="430" stroke="#64748b" stroke-width="2" />

    <line x1="260" y1="430" x2="1130" y2="430" stroke="#e2e8f0" />
    <line x1="434" y1="430" x2="434" y2="160" stroke="#e2e8f0" />
    <line x1="608" y1="430" x2="608" y2="160" stroke="#e2e8f0" />
    <line x1="782" y1="430" x2="782" y2="160" stroke="#e2e8f0" />
    <line x1="956" y1="430" x2="956" y2="160" stroke="#e2e8f0" />
    <line x1="1130" y1="430" x2="1130" y2="160" stroke="#e2e8f0" />

    <text x="252" y="452" class="axis">0.0</text>
    <text x="426" y="452" class="axis">0.2</text>
    <text x="600" y="452" class="axis">0.4</text>
    <text x="774" y="452" class="axis">0.6</text>
    <text x="948" y="452" class="axis">0.8</text>
    <text x="1122" y="452" class="axis">1.0</text>
  </g>

  <g id="row-style">
    <text x="84" y="202" class="label">style_check</text>
    <line x1="260" y1="196" x2="1130" y2="196" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round" />
    <line x1="1043" y1="196" x2="1087" y2="196" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" />
    <line x1="1052" y1="176" x2="1052" y2="216" stroke="#1d4ed8" stroke-width="4" />
    <text x="1094" y="200" class="value">0.91</text>
    <text x="84" y="224" class="meta">target: 0.90 - 0.95</text>
  </g>

  <g id="row-bug">
    <text x="84" y="302" class="label">bug_hunt</text>
    <line x1="260" y1="296" x2="1130" y2="296" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round" />
    <line x1="782" y1="296" x2="913" y2="296" stroke="#10b981" stroke-width="14" stroke-linecap="round" />
    <line x1="852" y1="276" x2="852" y2="316" stroke="#047857" stroke-width="4" />
    <text x="920" y="300" class="value">0.68</text>
    <text x="84" y="324" class="meta">target: 0.60 - 0.75</text>
  </g>

  <g id="row-full">
    <text x="84" y="402" class="label">full_review</text>
    <line x1="260" y1="396" x2="1130" y2="396" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round" />
    <line x1="651" y1="396" x2="782" y2="396" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" />
    <line x1="704" y1="376" x2="704" y2="416" stroke="#b45309" stroke-width="4" />
    <text x="789" y="400" class="value">0.51</text>
    <text x="84" y="424" class="meta">target: 0.45 - 0.60</text>
  </g>
</svg>
