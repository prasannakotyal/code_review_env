<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640" role="img" aria-labelledby="title desc">
  <title id="title">Code Review Environment - Episode Lifecycle</title>
  <desc id="desc">Step-by-step lifecycle from reset through iterative issue reporting, reward, and end-of-episode score.</desc>

  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .node-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .node-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="640" fill="#f8fafc" />

  <text x="56" y="66" class="title">Episode Lifecycle</text>
  <text x="56" y="94" class="subtitle">Execution flow for one task episode in inference.py and MyEnvironment.</text>

  <rect x="64" y="180" rx="12" ry="12" width="220" height="98" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="84" y="214" class="node-title">1) START</text>
  <text x="84" y="236" class="node-text">Emit [START] log line</text>
  <text x="84" y="256" class="node-text">task/env/model metadata</text>

  <rect x="324" y="180" rx="12" ry="12" width="220" height="98" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="344" y="214" class="node-title">2) RESET</text>
  <text x="344" y="236" class="node-text">POST /reset(task_name)</text>
  <text x="344" y="256" class="node-text">Receive first observation</text>

  <rect x="584" y="180" rx="12" ry="12" width="220" height="98" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="604" y="214" class="node-title">3) LLM ACTION</text>
  <text x="604" y="236" class="node-text">chat.completions.create</text>
  <text x="604" y="256" class="node-text">Parse one issue JSON</text>

  <rect x="844" y="180" rx="12" ry="12" width="220" height="98" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <text x="864" y="214" class="node-title">4) STEP</text>
  <text x="864" y="236" class="node-text">POST /step(action)</text>
  <text x="864" y="256" class="node-text">Reward + done status</text>

  <rect x="1104" y="180" rx="12" ry="12" width="220" height="98" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="1124" y="214" class="node-title">5) LOG STEP</text>
  <text x="1124" y="236" class="node-text">Emit [STEP] line</text>
  <text x="1124" y="256" class="node-text">Clamp reward display</text>

  <rect x="584" y="416" rx="12" ry="12" width="220" height="98" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="604" y="450" class="node-title">6) TERMINATE</text>
  <text x="604" y="472" class="node-text">done OR no issues left</text>
  <text x="604" y="492" class="node-text">OR max steps reached</text>

  <rect x="844" y="416" rx="12" ry="12" width="220" height="98" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="864" y="450" class="node-title">7) END SCORE</text>
  <text x="864" y="472" class="node-text">Aggregate rewards</text>
  <text x="864" y="492" class="node-text">Clamp to (0.01, 0.99)</text>

  <rect x="1104" y="416" rx="12" ry="12" width="220" height="98" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="1124" y="450" class="node-title">8) FINAL LOG</text>
  <text x="1124" y="472" class="node-text">Emit [END] line</text>
  <text x="1124" y="492" class="node-text">success, steps, score</text>

  <line x1="284" y1="229" x2="324" y2="229" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="544" y1="229" x2="584" y2="229" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="804" y1="229" x2="844" y2="229" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1064" y1="229" x2="1104" y2="229" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />

  <path d="M 1214 278 C 1214 345, 694 345, 694 416" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow-soft)" />
  <line x1="804" y1="465" x2="844" y2="465" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="1064" y1="465" x2="1104" y2="465" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />

  <path d="M 694 416 C 620 350, 620 300, 694 278" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow-soft)" />
  <text x="518" y="330" class="node-text">repeat until terminal condition</text>
</svg>
