<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1120" viewBox="0 0 980 1120" role="img" aria-labelledby="title desc">
  <title id="title">Code Review Environment - Episode Lifecycle</title>
  <desc id="desc">Vertical flowchart of one task episode with a single loop decision.</desc>

  <defs>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .h { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .p { font: 500 14px Arial, Helvetica, sans-serif; fill: #334155; }
      .legend { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow-main" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-loop" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="1120" fill="#f8fafc" />
  <text x="56" y="66" class="title">Episode Lifecycle</text>
  <text x="56" y="94" class="subtitle">Single-task flow from reset to final score.</text>

  <g id="nodes">
    <rect x="300" y="150" width="380" height="92" rx="10" ry="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
    <text x="328" y="186" class="h">1) START</text>
    <text x="328" y="210" class="p">Emit [START] with task, env, model</text>

    <rect x="300" y="290" width="380" height="92" rx="10" ry="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
    <text x="328" y="326" class="h">2) RESET</text>
    <text x="328" y="350" class="p">POST /reset and receive first observation</text>

    <rect x="300" y="430" width="380" height="92" rx="10" ry="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
    <text x="328" y="466" class="h">3) GENERATE ACTION</text>
    <text x="328" y="490" class="p">LLM completion and action parsing</text>

    <rect x="300" y="570" width="380" height="92" rx="10" ry="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
    <text x="328" y="606" class="h">4) STEP</text>
    <text x="328" y="630" class="p">POST /step and capture reward + done</text>

    <rect x="300" y="710" width="380" height="92" rx="10" ry="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
    <text x="328" y="746" class="h">5) LOG STEP</text>
    <text x="328" y="770" class="p">Emit [STEP] with action, reward, done, error</text>

    <polygon points="490,850 630,940 490,1030 350,940" fill="#ffffff" stroke="#64748b" stroke-width="2" />
    <text x="458" y="918" class="h">Continue?</text>
    <text x="406" y="940" class="p">not done and step &lt; max</text>
    <text x="435" y="960" class="p">and action != done</text>

    <rect x="710" y="892" width="220" height="92" rx="10" ry="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
    <text x="734" y="928" class="h">6) END</text>
    <text x="734" y="952" class="p">Compute score</text>
    <text x="734" y="972" class="p">Emit [END]</text>
  </g>

  <g id="arrows-main" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-main)">
    <line x1="490" y1="242" x2="490" y2="290" />
    <line x1="490" y1="382" x2="490" y2="430" />
    <line x1="490" y1="522" x2="490" y2="570" />
    <line x1="490" y1="662" x2="490" y2="710" />
    <line x1="490" y1="802" x2="490" y2="850" />
    <line x1="630" y1="940" x2="710" y2="940" />
  </g>

  <g id="loop" stroke="#64748b" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrow-loop)">
    <path d="M 350 940 L 220 940 L 220 476 L 300 476" />
  </g>

  <g id="labels">
    <text x="640" y="930" class="legend">No</text>
    <text x="250" y="928" class="legend">Yes</text>
    <circle cx="56" cy="1070" r="6" fill="#2563eb" />
    <text x="70" y="1074" class="legend">Primary flow</text>
    <circle cx="196" cy="1070" r="6" fill="#64748b" />
    <text x="210" y="1074" class="legend">Loopback path</text>
  </g>
</svg>
