<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Code Review Environment - System Architecture</title>
  <desc id="desc">High-level architecture showing inference runner, LiteLLM proxy path, environment server, graders, and output logs.</desc>

  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="#f8fafc" />

  <text x="56" y="66" class="title">Code Review Environment - System Architecture</text>
  <text x="56" y="94" class="subtitle">OpenEnv server, LLM proxy path, and grading flow used during inference.</text>

  <rect x="70" y="140" rx="14" ry="14" width="270" height="130" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="92" y="178" class="box-title">Agent Runner</text>
  <text x="92" y="203" class="box-text">inference.py</text>
  <text x="92" y="225" class="box-text">Task loop + structured logs</text>

  <rect x="390" y="140" rx="14" ry="14" width="270" height="130" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="412" y="178" class="box-title">OpenAI Client</text>
  <text x="412" y="203" class="box-text">base_url = API_BASE_URL</text>
  <text x="412" y="225" class="box-text">api_key = API_KEY / HF_TOKEN</text>

  <rect x="710" y="140" rx="14" ry="14" width="270" height="130" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="732" y="178" class="box-title">LiteLLM Proxy</text>
  <text x="732" y="203" class="box-text">Validator-injected endpoint</text>
  <text x="732" y="225" class="box-text">Usage tracked by organizers</text>

  <rect x="1030" y="140" rx="14" ry="14" width="300" height="130" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="1052" y="178" class="box-title">Foundation Model</text>
  <text x="1052" y="203" class="box-text">Qwen / OpenAI-compatible model</text>
  <text x="1052" y="225" class="box-text">Returns one JSON issue per step</text>

  <rect x="390" y="360" rx="14" ry="14" width="270" height="130" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <text x="412" y="398" class="box-title">Environment HTTP API</text>
  <text x="412" y="423" class="box-text">/reset  /step  /state</text>
  <text x="412" y="445" class="box-text">server.app FastAPI</text>

  <rect x="710" y="360" rx="14" ry="14" width="270" height="130" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <text x="732" y="398" class="box-title">MyEnvironment</text>
  <text x="732" y="423" class="box-text">Task orchestration</text>
  <text x="732" y="445" class="box-text">Issue matching + rewards</text>

  <rect x="1030" y="360" rx="14" ry="14" width="300" height="130" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="1052" y="398" class="box-title">Task Graders</text>
  <text x="1052" y="423" class="box-text">StyleCheckGrader</text>
  <text x="1052" y="445" class="box-text">BugHuntGrader, FullReviewGrader</text>

  <rect x="710" y="580" rx="14" ry="14" width="620" height="130" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="732" y="618" class="box-title">Structured Output</text>
  <text x="732" y="643" class="box-text">[START] task=... env=... model=...</text>
  <text x="732" y="665" class="box-text">[STEP] step=... action=... reward=... done=... error=...</text>
  <text x="732" y="687" class="box-text">[END] success=... steps=... score=... rewards=...</text>

  <line x1="340" y1="205" x2="390" y2="205" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="660" y1="205" x2="710" y2="205" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="980" y1="205" x2="1030" y2="205" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />

  <line x1="205" y1="270" x2="525" y2="360" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="660" y1="425" x2="710" y2="425" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="980" y1="425" x2="1030" y2="425" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="845" y1="490" x2="845" y2="580" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)" />

  <path d="M 1180 270 C 1180 315, 300 315, 300 205" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow-soft)" />
  <path d="M 525 360 C 300 320, 300 250, 205 250" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow-soft)" />

  <text x="72" y="756" class="legend">Solid arrows: request/processing flow. Dashed arrows: response/feedback flow.</text>
</svg>
